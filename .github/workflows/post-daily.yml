name: Publicação diária no Instagram

on:
  schedule:
    - cron: "0 11 * * *" # 08:00 no horário de Brasília (UTC-3)
    - cron: "15 11 * * *" # fallback: 08:15, caso o disparo das 08:00 atrase/falhe
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      already_ran: ${{ steps.check.outputs.already_ran }}
    steps:
      - name: Verificar se já publicou hoje
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/post-daily.yml/runs?status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.id != ${{ github.run_id }})] | length")
          echo "already_ran=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  post:
    needs: guard
    if: needs.guard.outputs.already_ran != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Gerar imagens do dia
        run: |
          node scripts/generate-image.js
          node scripts/generate-story.js
        env:
          PIX_KEY: ${{ secrets.PIX_KEY }}

      - name: Commitar imagens geradas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/
          git diff --staged --quiet || git commit -m "chore(content): gera imagens e legenda do devocional diário"
          git pull --rebase origin main
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          URL="${{ secrets.SITE_BASE_URL }}/output/devocional-${DATE_KEY}.png"
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Imagem disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Imagem não ficou disponível a tempo."
          exit 1

      - name: Publicar carrossel no Instagram
        run: node scripts/post-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}

      - name: Publicar story no Instagram
        run: node scripts/post-story-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
