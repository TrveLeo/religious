name: Publicação diária de Reel no Instagram

on:
  schedule:
    - cron: "0 19 * * *" # 16:00 no horário de Brasília (UTC-3)
    - cron: "15 19 * * *" # fallback: 16:15, caso o disparo das 16:00 atrase/falhe
  workflow_dispatch:
    inputs:
      type:
        description: "Forçar tipo (devotional, quote, trivia, reveal, impact, poll, weekly). Vazio = rotação por data."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      already_ran: ${{ steps.check.outputs.already_ran }}
    steps:
      - name: Verificar se já publicou hoje
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/post-reel.yml/runs?status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.id != ${{ github.run_id }})] | length")
          echo "already_ran=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  post:
    needs: guard
    if: needs.guard.outputs.already_ran != 'true' || github.event.inputs.type != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Escolher tipo de conteúdo do dia
        id: pick
        run: |
          FORCED="${{ github.event.inputs.type }}"
          if [ -n "$FORCED" ]; then
            echo "type=$FORCED" >> "$GITHUB_OUTPUT"
            echo "Tipo forçado: $FORCED"
            exit 0
          fi
          # Ciclo de 7 tipos, rotação separada do post-game (que usa % 14).
          TYPES=(devotional quote trivia reveal impact poll weekly)
          TYPE=${TYPES[$(( $(date -u +%j) % 7 ))]}
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Tipo escolhido: $TYPE (dia do ano % 7 = $(( $(date -u +%j) % 7 )))"

      - name: Gerar reel do dia
        run: node scripts/generate-reel.js
        env:
          REEL_TYPE: ${{ steps.pick.outputs.type }}
          PIX_KEY: ${{ secrets.PIX_KEY }}

      - name: Commitar reel gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/
          git diff --staged --quiet || git commit -m "chore(content): gera reel diário (${{ steps.pick.outputs.type }})"
          git pull --rebase origin main
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          URL="${{ secrets.SITE_BASE_URL }}/output/reel-${DATE_KEY}.mp4"
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Vídeo disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Vídeo não ficou disponível a tempo."
          exit 1

      - name: Publicar reel no Instagram
        run: node scripts/post-reel-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
