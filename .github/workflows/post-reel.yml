name: Publicação semanal de Reel no Instagram

on:
  schedule:
    - cron: "0 19 * * 3" # toda quarta, 16:00 no horário de Brasília (UTC-3)
    - cron: "15 19 * * 3" # fallback: 16:15, caso o disparo das 16:00 atrase/falhe
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      already_ran: ${{ steps.check.outputs.already_ran }}
    steps:
      - name: Verificar se já publicou hoje
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/post-reel.yml/runs?status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.id != ${{ github.run_id }})] | length")
          echo "already_ran=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  post:
    needs: guard
    if: needs.guard.outputs.already_ran != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Instalar ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Gerar reel do dia
        run: node scripts/generate-reel.js

      - name: Commitar reel gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/
          git diff --staged --quiet || git commit -m "chore(content): gera reel semanal"
          git pull --rebase origin main
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          URL="${{ secrets.SITE_BASE_URL }}/output/reel-${DATE_KEY}.mp4"
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Vídeo disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Vídeo não ficou disponível a tempo."
          exit 1

      - name: Publicar reel no Instagram
        run: node scripts/post-reel-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
