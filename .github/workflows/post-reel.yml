name: Publicação semanal de Reel no Instagram

on:
  schedule:
    - cron: "0 19 * * 3" # toda quarta, 16:00 no horário de Brasília (UTC-3)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Gerar reel do dia
        run: node scripts/generate-reel.js

      - name: Commitar reel gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/
          git diff --staged --quiet || git commit -m "chore(content): gera reel semanal"
          git pull --rebase origin main
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          URL="${{ secrets.SITE_BASE_URL }}/output/reel-${DATE_KEY}.mp4"
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Vídeo disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Vídeo não ficou disponível a tempo."
          exit 1

      - name: Publicar reel no Instagram
        run: node scripts/post-reel-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
