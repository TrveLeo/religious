name: Testes frontend (browser/jsdom)

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Os testes de frontend rodam em jsdom e não usam o canvas nativo, então
      # pulamos os scripts de build de dependências (mais rápido, sem apt).
      - name: Instalar dependências
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Rodar testes frontend com cobertura
        run: npm run test:frontend:cov
