name: Publicação diária secundária no Instagram

on:
  schedule:
    - cron: "0 18 * * *" # 15:00 no horário de Brasília (UTC-3)
    - cron: "15 18 * * *" # fallback: 15:15, caso o disparo das 15:00 atrase/falhe
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      already_ran: ${{ steps.check.outputs.already_ran }}
    steps:
      - name: Verificar se já publicou hoje
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(gh api "repos/${{ github.repository }}/actions/workflows/post-game.yml/runs?status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.id != ${{ github.run_id }})] | length")
          echo "already_ran=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  post:
    needs: guard
    if: needs.guard.outputs.already_ran != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Escolher tipo de conteúdo do dia
        id: pick
        run: |
          # Card de citação (quote) sai com mais frequência: é o formato mais
          # salvo/compartilhado, principal motor de descoberta orgânica.
          # Os formatos interativos (reveal, poll, weekly) entram pra puxar
          # comentário/salvamento e variar o feed.
          DAY_MOD=$(( $(date -u +%j) % 14 ))
          case $DAY_MOD in
            0) TYPE="quote" ;;
            1) TYPE="game" ;;     # Termo / Conexões (alterna dentro do script)
            2) TYPE="reveal" ;;   # desafio com resposta no swipe
            3) TYPE="trivia" ;;
            4) TYPE="quote" ;;
            5) TYPE="poll" ;;     # enquete da semana (voto nos comentários)
            6) TYPE="impact" ;;
            7) TYPE="quote" ;;
            8) TYPE="game" ;;
            9) TYPE="reveal" ;;
            10) TYPE="trivia" ;;
            11) TYPE="quote" ;;
            12) TYPE="weekly" ;;  # plano de leitura salvável da semana
            13) TYPE="poll" ;;
          esac
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "Tipo escolhido: $TYPE (dia do ano % 14 = $DAY_MOD)"

      - name: Gerar imagens do dia
        run: |
          case "${{ steps.pick.outputs.type }}" in
            game) node scripts/generate-game-images.js ;;
            quote) node scripts/generate-quote-card.js ;;
            trivia) node scripts/generate-trivia.js ;;
            impact) node scripts/generate-impact-card.js ;;
            reveal) node scripts/generate-reveal.js ;;
            poll) node scripts/generate-poll-card.js && node scripts/generate-ab-story.js ;;
            weekly) node scripts/generate-weekly-plan.js ;;
          esac
        env:
          PIX_KEY: ${{ secrets.PIX_KEY }}

      - name: Commitar imagens geradas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/
          git diff --staged --quiet || git commit -m "chore(content): gera imagens e legenda do post secundário diário"
          git pull --rebase origin main
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          case "${{ steps.pick.outputs.type }}" in
            game) URL="${{ secrets.SITE_BASE_URL }}/output/game-${DATE_KEY}-1.png" ;;
            quote) URL="${{ secrets.SITE_BASE_URL }}/output/quote-${DATE_KEY}-1.png" ;;
            trivia) URL="${{ secrets.SITE_BASE_URL }}/output/trivia-${DATE_KEY}-1.png" ;;
            impact) URL="${{ secrets.SITE_BASE_URL }}/output/impact-${DATE_KEY}-1.png" ;;
            reveal) URL="${{ secrets.SITE_BASE_URL }}/output/reveal-${DATE_KEY}-1.png" ;;
            poll) URL="${{ secrets.SITE_BASE_URL }}/output/poll-${DATE_KEY}-1.png" ;;
            weekly) URL="${{ secrets.SITE_BASE_URL }}/output/weekly-${DATE_KEY}-1.png" ;;
          esac
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Imagem disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Imagem não ficou disponível a tempo."
          exit 1

      - name: Publicar no Instagram
        run: |
          case "${{ steps.pick.outputs.type }}" in
            game) node scripts/post-game-instagram.js ;;
            quote) node scripts/post-quote-instagram.js ;;
            trivia) node scripts/post-trivia-instagram.js ;;
            impact) node scripts/post-impact-instagram.js ;;
            reveal) node scripts/post-reveal-instagram.js ;;
            poll) node scripts/post-poll-instagram.js && node scripts/post-ab-story-instagram.js ;;
            weekly) node scripts/post-weekly-plan-instagram.js ;;
          esac
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
