name: Publicação diária do jogo no Instagram

on:
  schedule:
    - cron: "0 18 * * *" # 15:00 no horário de Brasília (UTC-3)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Gerar imagens do jogo do dia
        run: node scripts/generate-game-images.js

      - name: Commitar imagens geradas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "Gera imagens e legenda do jogo diário"
          git push

      - name: Aguardar publicação no GitHub Pages
        run: |
          DATE_KEY=$(date -u +%Y-%m-%d)
          URL="${{ secrets.SITE_BASE_URL }}/output/game-${DATE_KEY}-1.png"
          for i in $(seq 1 30); do
            if curl -sfI "$URL" > /dev/null; then
              echo "Imagem disponível: $URL"
              exit 0
            fi
            sleep 10
          done
          echo "Imagem não ficou disponível a tempo."
          exit 1

      - name: Publicar no Instagram
        run: node scripts/post-game-instagram.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
