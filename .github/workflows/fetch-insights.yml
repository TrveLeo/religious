name: Coleta semanal de insights do Instagram

on:
  schedule:
    - cron: "0 12 * * 1" # toda segunda, 09:00 no horário de Brasília (UTC-3)
    - cron: "15 12 * * 1" # fallback: 09:15, caso o disparo das 09:00 atrase/falhe
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Buscar insights
        run: node scripts/fetch-insights.js
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}

      - name: Commitar histórico de insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/output/insights-history.json
          git diff --staged --quiet || git commit -m "chore(insights): atualiza histórico semanal"
          git pull --rebase origin main
          git push
